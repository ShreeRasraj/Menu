<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shree Rasraj Kitchen Menu</title>

<style>

/* FIXED BODY CSS */
body{
    margin:0;
    font-family: 'Georgia', serif;
    background:#f4efe9;
    color:#444;
}

/* TOP BAR */
.top-contact{
    text-align:center;
    background:#a97142;
    color:white;
    padding:10px;
    font-size:14px;
    letter-spacing:1px;
}

.top-contact a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}

.top-contact a:hover{
    text-decoration:underline;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:50px auto;
    background:#fff;
    padding:70px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.brand{
    text-align:center;
}

/* UPDATED HEADING */
.brand h1{
    font-size:40px;
    letter-spacing:4px;
    color:#a97142;
    margin:0;
}

.byline{
    display:block;
    font-size:16px;
    letter-spacing:2px;
    color:#777;
    margin-top:8px;
    font-weight:normal;
    font-style:italic;
}

.brand .subtitle{
    color:#777;
    margin-top:10px;
}

.brand .tagline{
    margin-top:20px;
    font-size:14px;
    font-style:italic;
    color:#666;
}

.section{
    margin-top:60px;
}

.section-title{
    display:inline-block;
    border:1px solid #c89b6d;
    padding:6px 18px;
    font-size:18px;
    letter-spacing:2px;
    color:#a97142;
    text-transform:uppercase;
}

.sub-note{
    font-size:13px;
    font-style:italic;
    color:#777;
    margin:10px 0 20px 0;
}

ul{
    list-style:none;
    padding:0;
}

li{
    padding:8px 0;
    border-bottom:1px dotted #ddd;
}

.category-divider{
    margin-top:25px;
    font-weight:bold;
    color:#555;
}

/* CONTACT */
.contact-note{
    text-align:center;
    margin-top:60px;
    font-size:15px;
    color:#555;
    line-height:1.6;
}

.contact-note a{
    color:#a97142;
    text-decoration:none;
    font-weight:bold;
}

.contact-note a:hover{
    text-decoration:underline;
}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:13px;
    color:#888;
}

.dark{
    background:#1f1f1f;
    color:#ddd;
}

.dark .container{
    background:#2b2b2b;
}

.dark li{
    border-bottom:1px dotted #444;
}

</style>
</head>

<body>

<div class="top-contact">
     📞 Call for orders: <a href="tel:8169874196">8169874196</a>
</div>

<div class="container">

<div class="brand">
    <h1>
        SHREE RASRAJ KITCHEN
        <span class="byline">by Sonal Mehta</span>
    </h1>
    <div class="subtitle">Premium Party Catering & Bulk Delivery</div>
    <div class="tagline">
        Expertly prepared • Hygienically packed • Delivered fresh
    </div>
</div>

<div id="menu"></div>

<div class="contact-note">
    For further price details and queries, please give us a call on 
    <a href="tel:8169874196">8169874196</a>
</div>

<div class="footer">
© Shree Rasraj Kitchen Catering
</div>

</div>

<script>
const menuData = [

{
title:"Standard Vegetable Sabzis",
note:"Rs 300 per kg",
items:["Aloo Gobi","Dum Aloo","Aloo Palak","Veg Hyderabadi","Bhindi Masala","Sev Tamatar","Baingan Bharta"]
},

{
title:"Punjabi Vegetable Specials",
note:"Rs 450 per kg",
items:["Mix Veg Punjabi","Veg Kolhapuri","Veg Jaipuri","Veg Handi","Veg Diwani Handi","Veg Makhanwala","Veg Kadai","Veg Angara","Veg Achari","Veg Tawa Masala","Veg Hyderabadi (Special)","Veg Amritsari"]
},

{
title:"Punjabi Paneer Specials",
note:"Rs 600 per kg",
items:["Paneer Butter Masala","Shahi Paneer","Kadai Paneer","Matar Paneer","Paneer Lababdar","Palak Paneer","Paneer Punjabi Masala","Paneer Kolhapuri","Paneer Jaipuri","Paneer Handi","Paneer Diwani Handi","Paneer Makhanwala","Paneer Angara","Paneer Achari","Paneer Tawa Masala","Paneer Hyderabadi (Special)","Paneer Amritsari"]
},

{
title:"Choice of Breads",
note:"Per piece",
items:["Ghee Roti – Rs 10","Tawa Paratha – Rs 15","Thepla – Rs 12","Methi Thepla – Rs 14","Bhakhri – Rs 20","Naan – Rs 25","Puri – Rs 8","Kulcha – Rs 35"]
},

{
title:"Dal & Kadhi Selection",
items:["Dal Tadka","Dal Fry","Gujarati Dal","Marwadi Dal","Udad Dal","Kadhi","Dal Makhani","Dal Mughlai","Panchmel Dal","Moong Dal"]
},

{
title:"Biryani & Rice",
note:"Per Plate (~300 gms)",
sub:[
{
name:"Biryani",
items:[
"Paneer Tikka Biryani – Rs 250",
"Veg Dum Biryani – Rs 180",
"Hyderabadi Dum Biryani – Rs 200"
]
},
{
name:"Rice",
items:[
"Rajma Rice – Rs 180",
"Jeera Rice with Dal Fry – Rs 180",
"Jeera Rice with Dal Tadka – Rs 200",
"Jeera Rice with Dal Makhni – Rs 250",
"Plain Rice – Rs 100"
]
}
]
},

{
title:"Asian Selection",
sub:[
{
name:"Noodles (Per Plate)",
items:[
"Veg Hakka Noodles",
"Schezwan Noodles",
"Paneer Chilli Noodles",
"Triple Schezwan Noodles"
]
},
{
name:"Fried Rice (Per Plate)",
items:[
"Veg Fried Rice",
"Schezwan Fried Rice",
"Triple Schezwan Rice"
]
},
{
name:"Indo-Chinese",
items:[
"Veg Manchurian (Dry/Gravy)",
"Paneer Manchurian",
"Chilli Paneer"
]
}
]
},

{
title:"Italian Selection",
items:[
"Red / White / Pink Sauce Pasta",
"Pesto Pasta",
"Italian Herb Rice",
"Garlic Bread"
]
},

{
title:"Mexican Selection",
items:[
"Burrito Bowl",
"Paneer Burrito Bowl",
"Burrito Wrap",
"Mexican Rice"
]
}

];

const container = document.getElementById("menu");

menuData.forEach(sec=>{
let div=document.createElement("div");
div.className="section";

let title=document.createElement("div");
title.className="section-title";
title.innerText=sec.title;
div.appendChild(title);

if(sec.note){
let note=document.createElement("div");
note.className="sub-note";
note.innerText=sec.note;
div.appendChild(note);
}

if(sec.items){
let ul=document.createElement("ul");
sec.items.forEach(i=>{
let li=document.createElement("li");
li.innerText=i;
ul.appendChild(li);
});
div.appendChild(ul);
}

if(sec.sub){
sec.sub.forEach(s=>{
let subTitle=document.createElement("div");
subTitle.className="category-divider";
subTitle.innerText=s.name;
div.appendChild(subTitle);

let ul=document.createElement("ul");
s.items.forEach(i=>{
let li=document.createElement("li");
li.innerText=i;
ul.appendChild(li);
});
div.appendChild(ul);
});
}

container.appendChild(div);
});
</script>

</body>
</html>
